version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_URL=${APP_URL}
      - PORT=5000
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      - db

  # PostgreSQL — uncomment if self-hosting the database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${PGUSER:-rentabuddy}
      - POSTGRES_PASSWORD=${PGPASSWORD:-changeme}
      - POSTGRES_DB=${PGDATABASE:-rentabuddy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
